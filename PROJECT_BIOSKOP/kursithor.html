<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pilih Kursi - Bioskop Online</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .seat {
      width: 40px;
      height: 40px;
      margin: 5px;
      background-color: #ccc;
      border-radius: 8px;
      text-align: center;
      line-height: 40px;
      cursor: pointer;
    }
    .seat.selected {
      background-color: #facc15;
      color: black;
    }
    .seat.occupied {
      background-color: #e3342f;
      cursor: not-allowed;
      color: white;
    }
    /* Pop-up style */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background-color: #1f2937;
      padding: 20px;
      border-radius: 8px;
      width: 300px;
      text-align: center;
      color: white;
    }
    .close-btn {
      background-color: #facc15;
      color: black;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body class="bg-gray-900 text-white">

  <!-- Navbar -->
  <nav class="bg-gray-800 p-6 shadow-lg">
    <div class="container mx-auto flex justify-between items-center">
      <a href="menu.html" class="text-2xl font-bold text-yellow-500">🎬 Bioskop Online</a>
      <a href="menu.html" class="text-lg hover:text-yellow-400">Kembali</a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold text-yellow-500 text-center mb-8">Pilih Kursi Anda</h1>

    <form id="bookingForm" class="bg-gray-800 p-6 rounded-xl shadow-lg space-y-6">
      <div>
        <label for="nama" class="block font-semibold mb-1 text-yellow-400">Nama Pemesan</label>
        <input type="text" id="nama" class="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2 text-white" required />
      </div>

      <div>
        <label for="jadwal" class="block font-semibold mb-1 text-yellow-400">Pilih Jadwal Tayang</label>
        <select id="jadwal" class="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2 text-white" required>
          <option value="">-- Pilih Jadwal --</option>
          <option value="10:00">10:00</option>
          <option value="13:00">13:00</option>
          <option value="16:00">16:00</option>
          <option value="19:00">19:00</option>
        </select>
      </div>

      <div class="flex items-center gap-4">
        <label class="text-yellow-400 font-semibold">Jumlah Tiket:</label>
        <button type="button" id="kurangiTiket" class="bg-yellow-500 text-black px-3 rounded hover:bg-yellow-400">-</button>
        <span id="jumlahTiket" class="font-bold text-xl w-6 text-center">1</span>
        <button type="button" id="tambahTiket" class="bg-yellow-500 text-black px-3 rounded hover:bg-yellow-400">+</button>
      </div>

      <div class="text-center bg-yellow-500 text-black font-semibold px-6 py-2 rounded-full shadow">LAYAR</div>

      <div id="seats" class="grid grid-cols-8 gap-2 justify-center"></div>

      <div class="text-center">
        <button id="confirmBtn" type="submit" class="bg-yellow-500 text-black px-6 py-2 rounded-lg hover:bg-yellow-400 transition disabled:opacity-50" disabled>
          Konfirmasi Tiket
        </button>
      </div>
    </form>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white text-center py-6 mt-10">
    <p class="text-sm">&copy; 2025 Bioskop Online. All Rights Reserved.</p>
  </footer>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <h2 class="text-xl font-bold text-yellow-400 mb-4">Pemesanan Sukses!</h2>
      <p id="modalMessage" class="mb-4"></p>
      <button id="closeModalBtn" class="close-btn">Tutup</button>
    </div>
  </div>

  <script src="kursithor.js"></script>
</body>
</html>
